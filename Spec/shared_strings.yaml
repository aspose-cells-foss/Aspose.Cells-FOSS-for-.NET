name: shared_strings
version: 0.1
description: >
  Shared string table rules and behavior for Aspose.Cells FOSS for .NET.

scope:
  included:
    - shared string table part
    - string interning
    - index allocation
    - read/write of plain shared strings
  excluded:
    - rich text run fidelity
    - phonetic runs
    - extension metadata inside shared strings

parts:
  - uri: /xl/sharedStrings.xml
    content_type: application/vnd.openxmlformats-officedocument.spreadsheetml.sharedStrings+xml
    required: false

xml:
  root: sst
  attributes:
    count:
      type: uint
      required: false
    uniqueCount:
      type: uint
      required: false
  children:
    - si*
  si:
    allowed_children:
      - t
      - r*
      - phoneticPr?
      - rPh*

behavior:
  preferred_write_mode: sharedStrings
  alternate_write_mode: inlineStr
  repository:
    value_to_index: dictionary
    index_to_value: list
  normalization:
    plain_text_only_in_v0_1: true

constraints:
  - code: SST001
    description: shared string indices used by cells must resolve to an existing entry
    severity: fatal
  - code: SST002
    description: string table order must be stable for deterministic output within a save session
    severity: warning
  - code: SST003
    description: count and uniqueCount, when emitted, should reflect logical table contents
    severity: warning

save_rules:
  - create sharedStrings part only when shared string mode is in use and at least one shared string exists
  - assign indices in first-seen stable order within save scope
  - flatten unsupported rich text to plain text in v0.1
  - omit count and uniqueCount if necessary during early implementation, but preferred to emit both correctly

recovery:
  recoverable_cases:
    - code: SST-R001
      condition: count or uniqueCount inconsistent with actual entries
      action: trust actual entries, recompute counts, warn
    - code: SST-R002
      condition: rich text entries present
      action: flatten to plain text logical value for v0.1 and warn
  lossy_cases:
    - code: SST-L001
      condition: cell points to missing shared string index
      action: substitute empty string or raw fallback, warn
  fatal_cases:
    - code: SST-F001
      condition: sharedStrings part is malformed beyond XML recovery and cells cannot be interpreted safely

diagnostics:
  warning_prefix: ACF-SST
  fields:
    - code
    - sst_index
    - repair_applied
    - data_loss_risk

tests:
  unit:
    - string_interning_stable_indices
    - shared_string_count_recompute
    - rich_text_flattening
  golden:
    - basic_shared_string_table
    - mixed_shared_and_inline_string_modes
  malformed:
    - inconsistent_counts
    - missing_index_reference
    - malformed_shared_strings_xml
