name: recovery_policy
version: 0.1
description: >
  Global recovery and diagnostics policy for Aspose.Cells FOSS for .NET.

objectives:
  - load real-world XLSX files that are damaged but still meaningfully recoverable
  - separate fatal failures from recoverable and lossy recoverable cases
  - preserve user trust through explicit diagnostics
  - avoid silent corruption where possible

load_options_integration:
  related_options:
    - StrictMode
    - TryRepairPackage
    - TryRepairXml
    - PreserveUnsupportedParts
    - WarningCallback

severity_model:
  fatal:
    definition: loading cannot continue safely
    result:
      - throw public load exception
  recoverable:
    definition: repair can be applied and logical loading may continue
    result:
      - record diagnostic
      - apply repair
      - continue
  lossy_recoverable:
    definition: loading may continue but some data may be degraded or dropped
    result:
      - record diagnostic
      - mark data loss risk
      - preserve raw parts when configured

repair_layers:
  package:
    examples:
      - synthesize missing workbook relationship from known workbook part path
      - synthesize missing content type override from existing part
      - tolerate unknown package parts
  xml:
    examples:
      - reorder rows
      - reorder cells
      - infer missing dimension
      - normalize missing auxiliary flags
  semantic:
    examples:
      - map invalid style index to style 0
      - recompute shared string counts
      - drop invalid cached formula value while preserving formula text

preservation_policy:
  unsupported_parts:
    when_enabled: preserve raw bytes for round-trip where feasible
    when_disabled: ignore unsupported parts and warn if data loss risk exists
  unsupported_features:
    strategy:
      - preserve when safe
      - degrade predictably
      - emit diagnostics

diagnostic_model:
  required_fields:
    - code
    - severity
    - message
    - repair_applied
    - data_loss_risk
  optional_fields:
    - part_uri
    - sheet_name
    - cell_ref
    - row_index
    - column_range
    - merge_ref

public_surface:
  workbook:
    - LoadDiagnostics
  callbacks:
    - IWarningCallback

rules:
  - id: RCV001
    description: Every automatic repair must produce a diagnostic entry.
    severity: fatal
  - id: RCV002
    description: Lossy recovery must set data loss risk.
    severity: fatal
  - id: RCV003
    description: StrictMode should disable or narrow non-essential repairs.
    severity: warning
  - id: RCV004
    description: Fatal conditions must not be silently downgraded.
    severity: fatal

strict_mode_policy:
  behavior:
    - permit only conservative inference
    - reject ambiguous repairs
    - still allow normalization that does not change logical meaning where explicitly approved
  examples:
    allowed:
      - sorting rows already uniquely identifiable
      - recomputing dimension from unambiguous cell set
    disallowed:
      - inventing workbook structures when multiple interpretations exist
      - silently dropping contradictory semantic payloads without warning

tests:
  unit:
    - diagnostic_entry_created_for_every_repair
    - lossy_recovery_sets_data_loss_risk
    - strict_mode_rejects_ambiguous_repairs
  integration:
    - package_xml_semantic_repair_pipeline
    - warning_callback_invocation
