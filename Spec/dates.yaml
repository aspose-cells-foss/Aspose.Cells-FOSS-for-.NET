name: dates
version: 0.1
description: >
  Date system, serial conversion, and date-related cell handling rules
  for Aspose.Cells FOSS for .NET.

scope:
  included:
    - workbook-level 1900/1904 date system
    - DateTime to serial conversion
    - serial to DateTime conversion
    - date cells stored as numeric values
    - interaction with style number formats
  excluded:
    - full calendar system customization
    - formula date evaluation

date_systems:
  supported:
    - Windows1900
    - Mac1904
  workbook_source:
    element: workbookPr
    attribute: date1904
  mapping:
    false: Windows1900
    true: Mac1904

storage_model:
  persisted_cell_type:
    primary: numeric_serial
    alternate:
      - iso_datetime_with_t_d_when_explicitly_supported
  display_model:
    controlled_by:
      - style number format
      - workbook display culture
      - locale directives embedded in the format code

internal_model:
  entities:
    - DateSystem
    - DateSerialConverter
    - WorkbookSettingsModel

conversion_rules:
  datetime_to_serial:
    Windows1900:
      rule: convert DateTime to Excel serial using 1900 date system compatibility rules
    Mac1904:
      rule: convert DateTime to Excel serial using 1904 epoch
  serial_to_datetime:
    Windows1900:
      rule: convert serial to DateTime using 1900 date system compatibility rules
    Mac1904:
      rule: convert serial to DateTime using 1904 epoch
  implementation_requirement:
    - all conversions must go through DateSerialConverter
    - conversion logic must not be duplicated across cell serializers/parsers

public_api_mapping:
  workbook:
    - Workbook.Settings
  cell:
    - Cell.PutValue(DateTime)
    - Cell.Value
    - Cell.StringValue
    - Cell.Type

constraints:
  - code: DATE001
    description: DateTime serialization must honor workbook date system.
    severity: fatal
  - code: DATE002
    description: Date serial conversion must be deterministic across frameworks.
    severity: fatal
  - code: DATE003
    description: Date display is not inferred from value alone; style/number format may be required.
    severity: warning
  - code: DATE004
    description: Workbook date1904 flag is the source of truth for workbook date system.
    severity: fatal

save_rules:
  - emit workbookPr@date1904=true when workbook uses Mac1904 system
  - omit workbookPr@date1904 or emit false-equivalent when using Windows1900 unless explicit workbook settings require emission
  - persist DateTime cell payloads as numeric serials in v0.1
  - preserve existing valid numeric cached values for formula date cells when loaded

recovery:
  recoverable_cases:
    - code: DATE-R001
      condition: workbookPr missing
      action: assume Windows1900 and warn
    - code: DATE-R002
      condition: numeric cell appears date-like but no date format exists
      action: preserve numeric value; do not force DateTime interpretation
  lossy_cases:
    - code: DATE-L001
      condition: unsupported explicit date cell type encoding encountered
      action: downgrade to preserved text or numeric fallback and warn
  fatal_cases:
    - code: DATE-F001
      condition: date system metadata is contradictory in unrecoverable ways
    - code: DATE-F002
      condition: serial conversion overflows supported DateTime range and no fallback policy exists

diagnostics:
  warning_prefix: ACF-DATE
  fields:
    - code
    - cell_ref
    - workbook_date_system
    - repair_applied
    - data_loss_risk

tests:
  unit:
    - datetime_to_serial_1900
    - datetime_to_serial_1904
    - serial_to_datetime_1900
    - serial_to_datetime_1904
    - cross_target_framework_determinism
  golden:
    - workbook_1900_with_datetime_cells
    - workbook_1904_with_datetime_cells
  malformed:
    - missing_workbookPr_defaults_to_1900
    - unsupported_explicit_date_encoding
