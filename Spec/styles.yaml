name: styles
version: 0.1
description: >
  Style system spec for Aspose.Cells FOSS for .NET.
  Public Style API is broad from v0.1; persisted core is a subset.

scope:
  included:
    - stylesheet part
    - fonts
    - fills
    - borders
    - cellStyleXfs basic defaults
    - cellXfs
    - numFmts
    - dxfs for classic conditional formatting
    - style repository and deduplication
    - public Style / Font / Borders shape
  excluded:
    - full named style system
    - table styles
    - color theme resolution beyond preservation
    - advanced conditional formatting style families beyond classic dxfs

parts:
  - uri: /xl/styles.xml
    content_type: application/vnd.openxmlformats-officedocument.spreadsheetml.styles+xml
    required: false

xml:
  root: styleSheet
  child_order:
    - numFmts?
    - fonts?
    - fills?
    - borders?
    - cellStyleXfs?
    - cellXfs?
    - cellStyles?
    - dxfs?
    - tableStyles?
    - colors?
    - extLst?

persisted_core:
  font:
    properties:
      - Name
      - Size
      - Bold
      - Italic
      - Underline
      - StrikeThrough
      - Color
  fill:
    properties:
      - Pattern
      - ForegroundColor
      - BackgroundColor
      - classic SpreadsheetML pattern families
  border:
    properties:
      - Left
      - Right
      - Top
      - Bottom
      - Diagonal
      - DiagonalUp
      - DiagonalDown
      - BorderStyle
      - Color
  alignment:
    properties:
      - HorizontalAlignment
      - VerticalAlignment
      - WrapText
      - IndentLevel
      - TextRotation
      - ShrinkToFit
      - ReadingOrder
      - RelativeIndent
  protection:
    properties:
      - IsLocked
      - IsHidden
  number_format:
    properties:
      - Number
      - Custom
      - NumberFormat facade property
      - built-in format lookup helpers

public_api_shape:
  objects:
    - Style
    - Font
    - Borders
    - Border
    - Color
    - NumberFormat
  rule:
    - public API breadth should be larger than persisted v0.1 subset
    - unsupported persisted properties may remain memory-only initially

internal_model:
  entities:
    - StyleValue
    - FontValue
    - FillValue
    - BorderValue
    - BorderSideValue
    - AlignmentValue
    - ProtectionValue
    - NumberFormatValue
    - StyleRepository

storage_strategy:
  style_repository:
    type: pooled_deduplicated_value_store
  mutation:
    public_style_behavior: facade_copy_on_write
  serialization:
    assign_stable_indices: true
    default_style_index: 0

constraints:
  - code: STY001
    description: default style index 0 must always exist
    severity: fatal
  - code: STY002
    description: cell style references must resolve to existing cellXfs entries
    severity: fatal
  - code: STY003
    description: font/fill/border pools must emit deterministic order for stable outputs
    severity: warning
  - code: STY004
    description: style equality must be value-based, not reference-based
    severity: fatal

save_rules:
  - emit styles part only when required by workbook content or explicit styling
  - generate minimum valid default stylesheet when any style usage exists
  - deduplicate equivalent font/fill/border/xf values
  - deduplicate equivalent differential style values for classic conditional formatting rules
  - preserve default built-in style semantics where practical
  - omit unsupported advanced style features in v0.1 while warning if data loss is possible

recovery:
  recoverable_cases:
    - code: STY-R001
      condition: styles part missing but workbook only uses default style
      action: continue with implicit default style model
    - code: STY-R002
      condition: styles part exists but counts are inconsistent
      action: rebuild logical collections from actual child nodes and warn
  lossy_cases:
    - code: STY-L001
      condition: cell references a non-existent style index
      action: map to style 0 and warn
    - code: STY-L002
      condition: unsupported advanced style subfeature encountered
      action: preserve raw part if configured; otherwise degrade gracefully and warn
  fatal_cases:
    - code: STY-F001
      condition: stylesheet XML is unreadable and no fallback default can safely continue

diagnostics:
  warning_prefix: ACF-STY
  fields:
    - code
    - style_index
    - repair_applied
    - data_loss_risk

tests:
  unit:
    - style_value_equality
    - style_repository_dedup
    - stable_style_index_assignment
    - copy_on_write_style_mutation
  golden:
    - minimal_stylesheet
    - styled_cells_with_fonts_fills_borders
    - number_formats_and_alignment
    - differential_formats_for_conditional_formatting
  malformed:
    - missing_stylesheet_with_default_cells
    - invalid_style_index_reference
    - inconsistent_stylesheet_counts

