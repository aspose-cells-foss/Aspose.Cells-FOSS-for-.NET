name: rows
version: 0.1
description: >
  Row-level worksheet rules for row metadata, ordering, and serialization.

scope:
  included:
    - row index
    - row height
    - hidden state
    - custom height flag
    - row style metadata
    - row ordering
  excluded:
    - outline levels
    - collapsed groups
    - thickTop/thickBot
    - phonetic row details

xml:
  element: row
  parent: sheetData
  attributes:
    r:
      type: uint
      required: true
    ht:
      type: double
      required: false
    hidden:
      type: bool
      required: false
    customHeight:
      type: bool
      required: false
    s:
      type: uint
      required: false
    customFormat:
      type: bool
      required: false

public_api_mapping:
  objects:
    - Cells.Rows
  future_compatibility_note:
    - row collection API may expand later without changing XML contract

internal_model:
  entities:
    - RowModel
    - WorksheetModel

constraints:
  - code: ROW001
    description: Row indices must be unique.
    severity: fatal
  - code: ROW002
    description: Row indices must be positive in XML and zero-based only in public indexers.
    severity: fatal
  - code: ROW003
    description: Serialized rows must be emitted in ascending row index order.
    severity: warning
  - code: ROW004
    description: customHeight should be emitted when ht is explicitly set.
    severity: warning

save_rules:
  - omit rows with no cells and no row metadata when allowed
  - emit ht and customHeight when explicit row height is set
  - emit hidden=true when row is hidden
  - emit style index only when row-level style exists

recovery:
  recoverable_cases:
    - code: ROW-R001
      condition: rows out of order
      action: sort rows by row index
    - code: ROW-R002
      condition: customHeight missing while ht exists
      action: infer customHeight=true
  lossy_cases:
    - code: ROW-L001
      condition: row style index out of range
      action: drop invalid row style and warn
  fatal_cases:
    - code: ROW-F001
      condition: duplicate row indices remain after normalization

diagnostics:
  warning_prefix: ACF-ROW
  fields:
    - code
    - row_index
    - repair_applied
    - data_loss_risk

tests:
  unit:
    - row_ordering
    - row_height_flags
    - hidden_row_serialization
  golden:
    - rows_with_custom_heights
    - hidden_rows_sheet
  malformed:
    - unsorted_rows_normalized
    - duplicate_rows_fatal
