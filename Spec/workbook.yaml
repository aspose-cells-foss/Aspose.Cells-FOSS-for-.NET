name: workbook
version: 0.1
description: >
  Workbook-level SpreadsheetML rules for Aspose.Cells FOSS for .NET.

scope:
  included:
    - workbook root
    - workbookPr
    - workbookProtection
    - bookViews/workbookView baseline
    - calcPr baseline
    - core and extended document properties
    - sheets collection
    - sheet metadata
    - date1904
    - workbook-defined names
    - workbook relationships to worksheets, styles, shared strings, and theme
  excluded:
    - external links
    - calc chain persistence
    - pivot cache definitions
    - custom workbook views
    - web publishing settings

parts:
  - uri: /xl/workbook.xml
    content_type: application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml
    required: true
  - uri: /docProps/core.xml
    content_type: application/vnd.openxmlformats-package.core-properties+xml
    required: false
  - uri: /docProps/app.xml
    content_type: application/vnd.openxmlformats-officedocument.extended-properties+xml
    required: false

relationships:
  from: /xl/workbook.xml
  allowed_targets:
    - rel_type: worksheet
      target: /xl/worksheets/sheet{n}.xml
      required: true
      cardinality: 1..n
    - rel_type: styles
      target: /xl/styles.xml
      required: false
      cardinality: 0..1
    - rel_type: sharedStrings
      target: /xl/sharedStrings.xml
      required: false
      cardinality: 0..1
    - rel_type: theme
      target: /xl/theme/theme1.xml
      required: false
      cardinality: 0..1


root_relationships:
  from: /
  allowed_targets:
    - rel_type: core-properties
      target: /docProps/core.xml
      required: false
      cardinality: 0..1
    - rel_type: extended-properties
      target: /docProps/app.xml
      required: false
      cardinality: 0..1
xml:
  root: workbook
  namespaces:
    main: http://schemas.openxmlformats.org/spreadsheetml/2006/main
    rel: http://schemas.openxmlformats.org/officeDocument/2006/relationships
  child_order:
    - fileVersion?
    - workbookPr?
    - bookViews?
    - sheets
    - definedNames?
    - calcPr?

elements:
  workbookPr:
    attributes:
      date1904:
        type: bool
        default: false
      showObjects:
        type: string
        required: false
      codeName:
        type: string
        required: false
      updateLinks:
        type: enum
        allowed: [userSet, never, always]
        required: false
  workbookProtection:
    required: false
  bookViews:
    required: false
  calcPr:
    required: false
  sheets:
    required: true
  sheet:
    attributes:
      name:
        type: string
        required: true
      sheetId:
        type: uint
        required: true
      state:
        type: enum
        allowed: [visible, hidden, veryHidden]
        default: visible
      r:id:
        type: relationship_id
        required: true

constraints:
  - code: WB001
    description: workbook must contain at least one sheet
    severity: fatal
  - code: WB002
    description: each sheet name must be non-empty and unique within workbook
    severity: fatal
  - code: WB003
    description: each sheetId must be unique
    severity: fatal
  - code: WB004
    description: each sheet r:id must resolve to a worksheet relationship target
    severity: fatal
  - code: WB005
    description: workbook date system must be derived from workbookPr@date1904
    severity: fatal

object_model_mapping:
  public:
    - Workbook
    - WorksheetCollection
    - Worksheet
    - WorkbookSettings
    - WorkbookProperties
    - WorkbookProtection
    - WorkbookView
    - CalculationProperties
    - DocumentProperties
    - CoreDocumentProperties
    - ExtendedDocumentProperties
    - DefinedNameCollection
    - DefinedName
  internal:
    - WorkbookModel
    - WorksheetEntry
    - WorkbookSettingsModel
    - WorkbookPropertiesModel
    - WorkbookProtectionModel
    - WorkbookViewModel
    - CalculationPropertiesModel
    - DocumentPropertiesModel
    - DefinedNameModel

date_system:
  source: workbookPr@date1904
  mapping:
    false: Windows1900
    true: Mac1904

save_rules:
  - create workbookPr when date1904 is true or when explicit workbook properties are set
  - emit sheets in worksheet collection order
  - allocate stable sheetId values
  - allocate stable relationship ids in save scope
  - create worksheet relationships for every visible or hidden worksheet
  - emit workbook-defined names after sheets and before calcPr
  - keep built-in print defined names before user-defined names
  - load optional core and extended document properties by root relationship type, not by hardcoded part path
  - save core and extended document properties to the conventional /docProps/core.xml and /docProps/app.xml targets

recovery:
  recoverable_cases:
    - code: WB-R001
      condition: workbookPr missing
      action: assume date1904=false and create default settings
    - code: WB-R002
      condition: sheet elements out of order or sheetId sequence non-contiguous
      action: preserve logical sheet order, normalize identifiers on save
    - code: WB-R003
      condition: workbook has no styles relationship but cells reference style index 0 only
      action: continue with implicit default style
  lossy_cases:
    - code: WB-L001
      condition: duplicate sheet names differ only by invalid XML recovery
      action: rename recovered sheet deterministically and emit warning
    - code: WB-L002
      condition: workbook-defined name has an invalid name, scope, formula, or duplicates an existing scope
      action: drop the invalid defined name, keep the rest of the workbook, and emit warning
    - code: WB-L003
      condition: workbook property, workbook view, workbook protection, or calcPr attribute is invalid
      action: ignore the invalid attribute, keep the workbook, and emit warning
    - code: WB-L004
      condition: optional core or extended document property metadata is malformed
      action: ignore the invalid metadata, keep the workbook, and emit warning
  fatal_cases:
    - code: WB-F001
      condition: sheets element missing or empty after recovery
    - code: WB-F002
      condition: a sheet relationship cannot be resolved or inferred

diagnostics:
  warning_prefix: ACF-WB
  fields:
    - code
    - sheet_name
    - relationship_id
    - repair_applied
    - data_loss_risk

tests:
  unit:
    - workbook_date1904_mapping
    - sheet_name_uniqueness
    - sheet_id_generation
    - defined_name_scope_rules
  golden:
    - workbook_single_sheet_default_1900
    - workbook_single_sheet_1904
    - workbook_multiple_sheets_hidden_state
    - workbook_defined_names_roundtrip
    - workbook_metadata_roundtrip
    - workbook_metadata_loads_from_root_relationship_targets
    - unreferenced_document_properties_parts_are_ignored
  malformed:
    - missing_workbookPr
    - duplicate_sheet_name
    - unresolved_sheet_relationship
    - invalid_defined_name_scope
    - invalid_workbook_metadata_attribute
    - invalid_document_properties
