name: cells
version: 0.1
description: >
  Cell value model, type mapping, A1 addressing, and object model behavior
  for Aspose.Cells FOSS for .NET.

scope:
  included:
    - cell addressing
    - scalar values
    - formulas
    - string handling
    - bool handling
    - number handling
    - datetime handling
    - blank cells
  excluded:
    - rich text runs
    - array formulas
    - shared formulas
    - error value semantics beyond preservation

addressing:
  formats:
    - A1
    - zero_based_row_column_public_indexer
  rules:
    - row index is zero-based in Cells[row, column]
    - column index is zero-based in Cells[row, column]
    - XML row/column references are 1-based
    - A1 parser must support columns beyond Z

public_api_mapping:
  cells_indexers:
    - Cells[this[string cellName]]
    - Cells[this[int row, int column]]
  cell_methods:
    - PutValue(string)
    - PutValue(int)
    - PutValue(double)
    - PutValue(bool)
    - PutValue(DateTime)
    - GetStyle()
    - SetStyle(Style)
  cell_properties:
    - Value
    - StringValue
    - DisplayStringValue
    - Formula
    - Type
internal_model:
  entities:
    - CellRecord
    - CellValue
    - CellValueKind
    - CellAddress
  cell_value_kinds:
    - Blank
    - String
    - SharedString
    - Number
    - Boolean
    - DateTime
    - Formula

serialization:
  blank_cell_rule:
    preserve_when:
      - explicit_style_exists
      - merge_anchor_requires_existence
      - formula_exists
    omit_when:
      - no_value
      - no_formula
      - default_style
  string_rule:
    preferred_mode: sharedStrings
    alternate_mode: inlineStr
  number_rule:
    xml_t_attribute: omitted_by_default
    value_format: invariant_culture
  boolean_rule:
    xml_t_attribute: b
    values:
      false: "0"
      true: "1"
  datetime_rule:
    stored_as: serial_number
    depends_on:
      - workbook date system
      - style number format for display
  formula_rule:
    store_in: f
    cached_value_in: v
    calculate_on_save: false

constraints:
  - code: CELL001
    description: A1 references must be syntactically valid
    severity: fatal
  - code: CELL002
    description: row and column indices must be non-negative
    severity: fatal
  - code: CELL003
    description: StringValue must never throw for supported value kinds
    severity: fatal
  - code: CELL004
    description: Formula and direct scalar value cannot both be primary active payloads without explicit cached value semantics
    severity: warning
  - code: CELL005
    description: DateTime serialization must route through workbook date system service
    severity: fatal

behavior:
  Value_property:
    notes:
      - returns the logical user-facing value
      - for formulas in v0.1, Value may expose cached value when available or null when absent
  StringValue_property:
    notes:
      - returns a textual representation without applying cell style display formatting
      - should be stable for string, number, bool, datetime, and blank
  DisplayStringValue_property:
    notes:
      - returns a style-aware display string for supported value kinds
      - number and datetime formatting should use the cell style number format when available
      - display formatting should use workbook culture with locale-directive override when present in the format code
      - workbook culture may be configured after load through Workbook.Settings.Culture
      - text sections may transform displayed string content without changing StringValue
      - unsupported or invalid display formats should fall back safely without throwing
  Formula_property:
    notes:
      - setting Formula marks the cell as formula cell
      - formula text should not include leading '=' in internal normalized storage if a consistent rule is adopted
      - public behavior should remain Aspose-like and user-friendly

recovery:
  recoverable_cases:
    - code: CELL-R001
      condition: numeric cell lacks t attribute
      action: interpret as numeric/general
    - code: CELL-R002
      condition: formula cell has invalid cached value
      action: preserve formula, clear cached value, warn
  lossy_cases:
    - code: CELL-L001
      condition: unsupported rich text inline string encountered
      action: flatten to plain text and warn
  fatal_cases:
    - code: CELL-F001
      condition: cell reference cannot be parsed or normalized
    - code: CELL-F002
      condition: negative index requested through public API

tests:
  unit:
    - a1_parse_and_format
    - zero_based_index_mapping
    - stringvalue_for_supported_types
    - datetime_serialization_mapping
  golden:
    - string_number_bool_datetime_cells
    - formula_cells_with_cached_values
  malformed:
    - invalid_a1_reference
    - broken_formula_cached_value
    - unsupported_rich_text_flattening






