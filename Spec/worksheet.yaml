name: worksheet
version: 0.1
description: >
  Worksheet-level SpreadsheetML rules for basic grid data, dimensions,
  rows, columns, merged cells, hyperlinks, auto filter metadata, conditional formatting, data validations, formula persistence, and sheet protection baseline settings.

scope:
  included:
    - worksheet root
    - dimension
    - sheetViews basic pass-through
    - sheet protection baseline
    - auto filter metadata
    - sheetFormatPr basic defaults
    - cols
    - sheetData
    - mergeCells
    - hyperlinks
    - conditional formatting
    - data validations
    - formulas (string persistence only)
  excluded:
    - drawings
    - tables
    - page setup
    - print options
    - legacy drawing anchors

parts:
  - uri: /xl/worksheets/sheet{n}.xml
    content_type: application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml
    required: true

xml:
  root: worksheet
  child_order:
    - sheetPr?
    - dimension?
    - sheetViews?
    - sheetFormatPr?
    - cols?
    - sheetData
    - sheetProtection?
    - autoFilter?
    - mergeCells?
    - hyperlinks?
    - phoneticPr?
    - conditionalFormatting*
    - dataValidations?
    - pageMargins?
    - pageSetup?
    - headerFooter?
    - drawing?
    - extLst?

object_model_mapping:
  public:
    - Worksheet
    - AutoFilter
    - FilterColumn
    - WorksheetProtection
    - Cells
    - Cell
    - HyperlinkCollection
    - Hyperlink
    - ValidationCollection
    - Validation
    - ConditionalFormattingCollection
    - FormatConditionCollection
    - FormatCondition
  internal:
    - AutoFilterModel
    - FilterColumnModel
    - AutoFilterSortStateModel
    - WorksheetModel
    - WorksheetProtectionModel
    - RowModel
    - CellRecord
    - MergeRegion
    - HyperlinkModel
    - ValidationModel
    - ConditionalFormattingModel
    - FormatConditionModel

save_rules:
  row_order: ascending by row index
  cell_order: ascending by column index within row
  dimension:
    strategy: recalculate_from_cells_and_merges
  row_serialization:
    omit_empty_rows_without_metadata: true
  column_serialization:
    combine_compatible_ranges: true
  style_rule:
    omit s attribute when style index is default 0 and explicit style not required
  formula_rule:
    persist formula text only in v0.1
    cached_values:
      preserve_when_loaded_and_valid: true
      calculate: false
  hyperlink_rule:
    emit_hyperlinks_container_when_non_empty: true
    order: ascending_by_anchor
    worksheet_relationships:
      external_links_use_relationships: true
      internal_links_use_location_only: true
  conditional_formatting_rule:
    emit_conditional_formatting_when_non_empty: true
    order: ascending_by_first_area
  validation_rule:
    emit_data_validations_when_non_empty: true
    order: ascending_by_first_area
  sheet_protection_rule:
    emit_sheet_protection_when_enabled: true
    preserve_legacy_password_hash: true
  auto_filter_rule:
    emit_auto_filter_when_range_present: true
    filter_column_order: ascending_by_colid
    preserve_sort_state: true

recovery:
  recoverable_cases:
    - code: WS-R001
      condition: dimension missing
      action: recalculate dimension from cells and merges
    - code: WS-R002
      condition: rows out of order
      action: sort rows by index
    - code: WS-R003
      condition: cells out of order within row
      action: sort cells by column
    - code: WS-R004
      condition: row attribute r missing but row can be inferred from contained cells
      action: infer row index
    - code: WS-R005
      condition: unknown safe-to-ignore elements are present
      action: ignore and continue; preserve raw part when configured
  lossy_cases:
    - code: WS-L001
      condition: style index out of range
      action: replace with style 0 and warn
    - code: WS-L002
      condition: shared string reference broken
      action: replace with empty string or raw fallback and warn
    - code: WS-L003
      condition: overlapping mergeCells
      action: keep first deterministic range, drop conflicting ranges, warn
    - code: WS-L004
      condition: invalid or conflicting hyperlinks
      action: keep first deterministic hyperlink when possible, otherwise drop and warn
    - code: WS-L005
      condition: invalid or conflicting data validations
      action: keep first deterministic validation coverage when possible, otherwise drop and warn
    - code: WS-L006
      condition: invalid or unsupported conditional formatting
      action: drop invalid rules or collections deterministically and warn
    - code: WS-L009
      condition: invalid sheetProtection boolean attributes
      action: use deterministic defaults and warn
    - code: WS-L010
      condition: invalid autoFilter ref
      action: drop autoFilter metadata and warn
    - code: WS-L011
      condition: invalid or conflicting autoFilter filter column metadata
      action: drop invalid filter column entries deterministically and warn
    - code: WS-L012
      condition: invalid autoFilter sort state metadata
      action: drop invalid sort state metadata and warn
  fatal_cases:
    - code: WS-F001
      condition: sheetData missing and cannot be synthesized
    - code: WS-F002
      condition: duplicate cell references remain after normalization

diagnostics:
  warning_prefix: ACF-WS
  fields:
    - code
    - cell_ref
    - row_index
    - repair_applied
    - data_loss_risk

tests:
  unit:
    - dimension_recalculation
    - row_and_cell_sorting
    - merge_overlap_detection
    - cell_reference_uniqueness
    - validation_overlap_detection
    - conditional_formatting_area_ordering
    - sheet_protection_api_mutation
    - auto_filter_api_mutation
  golden:
    - basic_cells_sheet
    - merged_cells_sheet
    - custom_row_height_and_column_width
    - formula_persistence_sheet
    - validation_persistence_sheet
    - conditional_formatting_persistence_sheet
    - sheet_protection_persistence_sheet
    - auto_filter_persistence_sheet
  malformed:
    - missing_dimension
    - unsorted_rows
    - unsorted_cells
    - invalid_style_index
    - overlapping_merges
    - invalid_validation_sqref
    - invalid_conditional_formatting_sqref
    - invalid_sheet_protection_attribute
    - invalid_autofilter_ref
    - invalid_autofilter_sortstate
